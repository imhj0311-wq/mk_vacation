
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Vacation Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap" rel="stylesheet">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, doc, addDoc, deleteDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDzoTTO74STfmq6KKXloM4YXOZeT5kycsE",
            authDomain: "vacationplan-73bdb.firebaseapp.com",
            projectId: "vacationplan-73bdb",
            storageBucket: "vacationplan-73bdb.firebasestorage.app",
            messagingSenderId: "913129064834",
            appId: "1:913129064834:web:317ba4471dfc206d1d679b"
        };

        const app = initializeApp(firebaseConfig);
        const db  = getFirestore(app);

        window.FirebaseDB  = db;
        window.FirebaseLib = { collection, doc, addDoc, deleteDoc, updateDoc, onSnapshot };
        window.firebaseReady = true;
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <style>
        body { font-family: 'Pretendard', sans-serif; }
        .scale-in { animation: scaleIn 0.2s ease-out; }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to   { opacity: 1; transform: scale(1); }
        }
        .vac-chip:hover { opacity: 0.75; cursor: pointer; }
    </style>
</head>
<body class="bg-[#f8fafc]">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const SUB_OPTIONS = {
    '1.0' : ['연차'],
    '0.5' : ['오전반차', '오후반차'],
    '0.25': ['반반차(09-11)', '반반차(11-13)', '반반차(14-16)', '반반차(16-18)'],
    'MANO': ['마노(2h 늦참)', '마노(2h 조퇴)'],
};

/* 달력 칩에 표시할 라벨 */
const getChipLabel = (v) => {
    if (v.type === '1.0')   return '연차';
    if (v.type === 'MANO')  return v.subType === '마노(2h 늦참)' ? '늦참' : '조퇴';
    if (v.type === '0.5')   return v.subType === '오전반차' ? '오전반차' : '오후반차';
    if (v.type === '0.25') {
        // "반반차(09-11)" → "09-11"
        const match = v.subType.match(/\((.+)\)/);
        return match ? `반반차(${match[1]})` : v.subType;
    }
    return v.subType;
};

const TYPE_STYLE = {
    '1.0' : { bg: '#6366f122', border: '#6366f1', text: '#4338ca' },
    '0.5' : { bg: '#f59e0b22', border: '#f59e0b', text: '#b45309' },
    '0.25': { bg: '#ec489922', border: '#ec4899', text: '#9d174d' },
    'MANO': { bg: '#10b98122', border: '#10b981', text: '#065f46' },
};

const MEMBER_COLORS = [
    '#6366f1','#ec4899','#10b981','#f59e0b',
    '#3b82f6','#8b5cf6','#ef4444','#14b8a6',
];
const getColor = (idx) => MEMBER_COLORS[idx % MEMBER_COLORS.length];

const col = (name) => window.FirebaseLib.collection(window.FirebaseDB, 'vacation-team', 'shared', name);
const ref = (name, id) => window.FirebaseLib.doc(window.FirebaseDB, 'vacation-team', 'shared', name, id);

const EMPTY_FORM = { memberId: '', type: '1.0', subType: '연차', startDate: '', endDate: '' };

const App = () => {
    const [ready,     setReady]     = useState(false);
    const [members,   setMembers]   = useState([]);
    const [vacations, setVacations] = useState([]);
    const [toast,     setToast]     = useState(null);

    const [currentDate,       setCurrentDate]       = useState(new Date());
    const [showMemberModal,   setShowMemberModal]   = useState(false);
    const [showVacationModal, setShowVacationModal] = useState(false);
    const [editingVacation,   setEditingVacation]   = useState(null); // null=등록, obj=수정
    const [editingMember,     setEditingMember]     = useState(null); // null=등록, obj=수정
    const [newMember,         setNewMember]         = useState({ name: '', total: '15' });
    const [vacationForm,      setVacationForm]      = useState(EMPTY_FORM);

    const showToast = (msg) => {
        setToast(msg);
        setTimeout(() => setToast(null), 2500);
    };

    useEffect(() => {
        const setup = () => {
            const { onSnapshot } = window.FirebaseLib;
            onSnapshot(col('members'), (snap) => {
                setMembers(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                setReady(true);
            }, () => setReady(true));
            onSnapshot(col('vacations'), (snap) => {
                setVacations(snap.docs.map(d => ({ id: d.id, ...d.data() })));
            });
        };
        if (window.firebaseReady) setup();
        else window.addEventListener('firebase-ready', setup, { once: true });
    }, []);

    /* 멤버 등록 모달 열기 */
    const openAddMember = () => {
        setEditingMember(null);
        setNewMember({ name: '', total: '15' });
        setShowMemberModal(true);
    };

    /* 멤버 수정 모달 열기 */
    const openEditMember = (m) => {
        setEditingMember(m);
        setNewMember({ name: m.name, total: String(m.total) });
        setShowMemberModal(true);
    };

    /* 멤버 저장 (등록 or 수정) */
    const handleSaveMember = async () => {
        if (!newMember.name.trim()) return;
        if (editingMember) {
            await window.FirebaseLib.updateDoc(ref('members', editingMember.id), { name: newMember.name, total: parseFloat(newMember.total) || 0 });
            showToast('멤버가 수정되었습니다 ✓');
        } else {
            await window.FirebaseLib.addDoc(col('members'), { name: newMember.name, total: parseFloat(newMember.total) || 0 });
            showToast('멤버가 등록되었습니다 ✓');
        }
        setNewMember({ name: '', total: '15' });
        setEditingMember(null);
        setShowMemberModal(false);
    };

    /* 멤버 삭제 */
    const handleDeleteMember = async (id) => {
        if (!confirm('멤버를 삭제할까요? 해당 멤버의 모든 일정도 삭제됩니다.')) return;
        await window.FirebaseLib.deleteDoc(ref('members', id));
        for (const v of vacations.filter(v => v.memberId === id))
            await window.FirebaseLib.deleteDoc(ref('vacations', v.id));
        setShowMemberModal(false);
        showToast('멤버가 삭제되었습니다');
    };

    /* 일정 등록 모달 열기 (날짜 클릭) */
    const openAddVacation = (ds) => {
        if (members.length === 0) return alert('멤버를 먼저 등록해주세요.');
        setEditingVacation(null);
        setVacationForm({ memberId: members[0]?.id || '', type: '1.0', subType: '연차', startDate: ds, endDate: ds });
        setShowVacationModal(true);
    };

    /* 일정 수정 모달 열기 (칩 클릭) */
    const openEditVacation = (v) => {
        setEditingVacation(v);
        setVacationForm({
            memberId:  v.memberId,
            type:      v.type,
            subType:   v.subType,
            startDate: v.startDate,
            endDate:   v.endDate || v.startDate,
        });
        setShowVacationModal(true);
    };

    /* 일정 저장 (등록 or 수정) */
    const handleSaveVacation = async () => {
        if (!vacationForm.memberId || !vacationForm.startDate) return;
        const entry = {
            ...vacationForm,
            endDate: vacationForm.type === '1.0'
                ? (vacationForm.endDate || vacationForm.startDate)
                : vacationForm.startDate,
        };
        if (editingVacation) {
            await window.FirebaseLib.updateDoc(ref('vacations', editingVacation.id), entry);
            showToast('일정이 수정되었습니다 ✓');
        } else {
            await window.FirebaseLib.addDoc(col('vacations'), { ...entry, createdAt: new Date().toISOString() });
            showToast('일정이 저장되었습니다 ✓');
        }
        setShowVacationModal(false);
        setEditingVacation(null);
    };

    /* 일정 삭제 */
    const handleDeleteVacation = async (id) => {
        if (!confirm('일정을 삭제할까요?')) return;
        await window.FirebaseLib.deleteDoc(ref('vacations', id));
        setShowVacationModal(false);
        setEditingVacation(null);
        showToast('일정이 삭제되었습니다');
    };

    /* 연차 계산 */
    const calcUsed = (memberId) => {
        const raw = vacations.filter(v => v.memberId === memberId).reduce((acc, v) => {
            if (v.type === 'MANO') return acc;
            if (v.type === '1.0') {
                const diff = Math.ceil(Math.abs(new Date(v.endDate || v.startDate) - new Date(v.startDate)) / 86400000) + 1;
                return acc + diff;
            }
            return acc + parseFloat(v.type);
        }, 0);
        return Number.isInteger(raw) ? raw : parseFloat(raw.toFixed(2));
    };

    /* 달력 */
    const year        = currentDate.getFullYear();
    const month       = currentDate.getMonth();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const firstDay    = new Date(year, month, 1).getDay();
    const days        = Array.from({ length: daysInMonth }, (_, i) => i + 1);
    const empties     = Array.from({ length: firstDay });
    const todayStr    = new Date().toISOString().split('T')[0];

    const colorMap = {};
    members.forEach((m, i) => { colorMap[m.id] = getColor(i); });

    if (!ready) return (
        <div className="h-screen flex flex-col items-center justify-center gap-3 text-slate-400">
            <div className="w-8 h-8 border-4 border-indigo-100 border-t-indigo-500 rounded-full animate-spin"></div>
            <p className="font-bold text-sm">연결 중...</p>
        </div>
    );

    return (
        <div className="min-h-screen p-4 md:p-8 bg-[#f8fafc]">

            {toast && (
                <div className="fixed top-5 left-1/2 -translate-x-1/2 z-[9999] bg-emerald-500 text-white px-6 py-2.5 rounded-full font-bold text-sm shadow-lg whitespace-nowrap">
                    {toast}
                </div>
            )}

            <header className="max-w-7xl mx-auto mb-8 text-center">
                <h1 className="text-4xl font-black text-slate-900 tracking-tight">🏖️ 마인드노크 1본부 2팀 휴가관리</h1>
                <div className="flex items-center justify-center gap-2 mt-2">
                    <div className="flex items-center gap-2 bg-green-50 px-3 py-1 rounded-full border border-green-100">
                        <span className="w-2 h-2 bg-green-500 rounded-full animate-ping"></span>
                        <p className="text-green-600 font-bold text-xs uppercase">OFF Air </p>
                    </div>
                </div>
                {/* 범례 */}
                <div className="flex items-center justify-center gap-4 mt-3 flex-wrap">
                    {[['1.0','#6366f1','연차'],['0.5','#f59e0b','반차'],['0.25','#ec4899','반반차'],['MANO','#10b981','마노']].map(([type, color, label]) => (
                        <div key={type} className="flex items-center gap-1.5">
                            <span style={{ width:10, height:10, borderRadius:3, background:color, display:'inline-block' }}></span>
                            <span style={{ fontSize:11, color:'#64748b', fontWeight:700 }}>{label}</span>
                        </div>
                    ))}
                </div>
            </header>

            <div className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">

                {/* 왼쪽: 멤버 현황 */}
                <div className="lg:col-span-3 space-y-6">
                    <div className="bg-white rounded-[2rem] p-6 shadow-xl border border-slate-100">
                        <div className="flex justify-between items-center mb-5">
                            <h3 className="text-lg font-black text-indigo-600">멤버 현황</h3>
                            <button onClick={openAddMember}
                                className="bg-indigo-50 text-indigo-600 p-2 rounded-xl hover:bg-indigo-600 hover:text-white transition-all text-sm">➕</button>
                        </div>

                        <div className="grid grid-cols-4 px-2 mb-2">
                            {['이름','총','사용','잔여'].map((h, i) => (
                                <div key={h} className={`text-[10px] font-black text-slate-300 uppercase ${i > 0 ? 'text-center' : ''}`}>{h}</div>
                            ))}
                        </div>

                        <div className="space-y-1">
                            {members.length === 0
                                ? <p className="text-center py-8 text-slate-300 text-sm">멤버를 추가하세요.</p>
                                : [...members].sort((a, b) => a.name.localeCompare(b.name)).map(m => {
                                    const used  = calcUsed(m.id);
                                    const remVal = m.total - used; const rem = Number.isInteger(remVal) ? String(remVal) : remVal.toFixed(2).replace(/\.?0+$/, '');
                                    const color = colorMap[m.id];
                                    return (
                                        <div key={m.id} className="grid grid-cols-4 items-center p-2 hover:bg-slate-50 rounded-xl group transition-all">
                                            <div className="flex items-center gap-1.5 cursor-pointer" onClick={() => openEditMember(m)}>
                                                <span style={{ width:8, height:8, borderRadius:'50%', background:color, display:'inline-block', flexShrink:0 }}></span>
                                                <span className="font-bold text-slate-700 text-xs hover:text-indigo-600 transition-colors">{m.name}</span>
                                            </div>
                                            <div className="text-center text-xs text-slate-400">{m.total}</div>
                                            <div className="text-center text-xs text-rose-500 font-bold">{used}</div>
                                            <div className="flex items-center justify-center gap-1">
                                                <span className="text-indigo-600 font-black">{rem}</span>
                                                <button onClick={() => handleDeleteMember(m.id)}
                                                    className="opacity-0 group-hover:opacity-100 text-[9px] bg-red-100 text-red-400 rounded px-1 transition-all">✕</button>
                                            </div>
                                        </div>
                                    );
                                })
                            }
                        </div>
                    </div>

                    <div className="bg-green-600 rounded-[2rem] p-6 text-white shadow-xl">
                        <h4 className="font-bold mb-1 text-sm">☁️ 실시간 동기화 중</h4>
                        <p className="text-[10px] opacity-80 leading-relaxed">모든 팀원이 동일한 데이터를 실시간으로 확인하고 수정할 수 있습니다.</p>
                        <p className="text-[10px] opacity-60 mt-2">멤버: {members.length}명 · 일정: {vacations.length}건</p>
                    </div>
                </div>

                {/* 오른쪽: 달력 */}
                <div className="lg:col-span-9">
                    <div className="bg-white rounded-[2rem] p-6 shadow-xl border border-slate-100">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-2xl font-black">{year}년 {month + 1}월</h2>
                            <div className="flex gap-2 bg-slate-50 p-1.5 rounded-2xl">
                                <button onClick={() => setCurrentDate(new Date(year, month - 1, 1))} className="p-2 hover:bg-white rounded-xl text-sm">◀</button>
                                <button onClick={() => setCurrentDate(new Date())} className="px-4 py-1 font-bold text-xs bg-white shadow-sm rounded-xl">TODAY</button>
                                <button onClick={() => setCurrentDate(new Date(year, month + 1, 1))} className="p-2 hover:bg-white rounded-xl text-sm">▶</button>
                            </div>
                        </div>

                        <div className="grid grid-cols-7 gap-1.5">
                            {['SUN','MON','TUE','WED','THU','FRI','SAT'].map((d, i) => (
                                <div key={d} className={`text-center text-[10px] font-black mb-1 py-1 ${i===0?'text-rose-400':i===6?'text-indigo-400':'text-slate-300'}`}>{d}</div>
                            ))}

                            {empties.map((_, i) => <div key={`e${i}`}></div>)}

                            {days.map(d => {
                                const ds     = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                                const todays = vacations.filter(v => ds >= v.startDate && ds <= (v.endDate || v.startDate));
                                const isToday = todayStr === ds;
                                const dow    = new Date(ds).getDay();

                                return (
                                    <div key={d}
                                        onClick={() => openAddVacation(ds)}
                                        className={`min-h-[120px] p-2 border rounded-xl cursor-pointer hover:bg-indigo-50/20 transition-all
                                            ${isToday ? 'border-indigo-300 bg-indigo-50/30' : 'border-slate-100'}`}>

                                        <div className={`text-xs font-black mb-1 ${isToday?'text-indigo-600':dow===0?'text-rose-400':dow===6?'text-indigo-400':'text-slate-400'}`}>{d}</div>

                                        <div className="flex flex-col gap-1">
                                            {todays.map(v => {
                                                const mem   = members.find(x => x.id === v.memberId);
                                                const style = TYPE_STYLE[v.type] || TYPE_STYLE['1.0'];
                                                const label = getChipLabel(v);
                                                return (
                                                    <div key={v.id}
                                                        onClick={e => { e.stopPropagation(); openEditVacation(v); }}
                                                        className="vac-chip rounded-md px-1.5 py-0.5 transition-all"
                                                        style={{ background: style.bg, borderLeft: `2.5px solid ${style.border}` }}>
                                                        <div style={{ color: style.text, fontSize: 9, fontWeight: 800, lineHeight: 1.4 }}>
                                                            {mem?.name || '...'}
                                                        </div>
                                                        <div style={{ color: style.border, fontSize: 9, fontWeight: 700, lineHeight: 1.3 }}>
                                                            {label}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            </div>

            {/* 모달: 멤버 등록 */}
            {showMemberModal && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-sm">
                    <div className="bg-white rounded-[2rem] p-8 w-full max-w-md scale-in shadow-2xl">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-xl font-black">{editingMember ? '멤버 수정' : '멤버 등록'}</h2>
                            {editingMember && (
                                <button onClick={() => handleDeleteMember(editingMember.id)}
                                    className="text-xs bg-red-50 text-red-400 border border-red-100 px-3 py-1.5 rounded-xl font-bold hover:bg-red-100 transition-colors">
                                    🗑 삭제
                                </button>
                            )}
                        </div>
                        <div className="space-y-4">
                            <input type="text" placeholder="이름" value={newMember.name}
                                onChange={e => setNewMember({...newMember, name: e.target.value})}
                                onKeyDown={e => e.key==='Enter' && handleSaveMember()}
                                className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold border border-slate-100" />
                            <input type="number" placeholder="부여 연차 (예: 15, 11.5)" value={newMember.total} step="0.25" min="0"
                                onChange={e => setNewMember({...newMember, total: e.target.value})}
                                className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold border border-slate-100" />
                            <div className="flex gap-2">
                                <button onClick={() => { setShowMemberModal(false); setEditingMember(null); }} className="flex-1 p-4 font-bold text-slate-400">취소</button>
                                <button onClick={handleSaveMember} className="flex-1 p-4 bg-indigo-600 text-white rounded-2xl font-bold hover:bg-indigo-700 transition-colors">{editingMember ? '수정 완료' : '등록'}</button>
                            </div>
                        </div>
                    </div>
                </div>
            )}

            {/* 모달: 일정 등록 / 수정 */}
            {showVacationModal && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-sm">
                    <div className="bg-white rounded-[2rem] p-8 w-full max-w-lg scale-in shadow-2xl">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-xl font-black">{editingVacation ? '일정 수정' : '일정 등록'}</h2>
                            {editingVacation && (
                                <button onClick={() => handleDeleteVacation(editingVacation.id)}
                                    className="text-xs bg-red-50 text-red-400 border border-red-100 px-3 py-1.5 rounded-xl font-bold hover:bg-red-100 transition-colors">
                                    🗑 삭제
                                </button>
                            )}
                        </div>
                        <div className="space-y-5">
                            <div className="grid grid-cols-2 gap-4">
                                <select value={vacationForm.memberId}
                                    onChange={e => setVacationForm({...vacationForm, memberId: e.target.value})}
                                    className="p-4 bg-slate-50 rounded-2xl font-bold outline-none border border-slate-100">
                                    {members.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                                </select>
                                <select value={vacationForm.type}
                                    onChange={e => setVacationForm({...vacationForm, type: e.target.value, subType: SUB_OPTIONS[e.target.value][0]})}
                                    className="p-4 bg-slate-50 rounded-2xl font-bold outline-none border border-slate-100">
                                    <option value="1.0">연차 (1.0)</option>
                                    <option value="0.5">반차 (0.5)</option>
                                    <option value="0.25">반반차 (0.25)</option>
                                    <option value="MANO">마노데이 (0.0)</option>
                                </select>
                            </div>

                            <div className="grid grid-cols-2 gap-2">
                                {SUB_OPTIONS[vacationForm.type].map(opt => (
                                    <button key={opt}
                                        onClick={() => setVacationForm({...vacationForm, subType: opt})}
                                        className={`p-3 rounded-xl border-2 text-[10px] font-black transition-all
                                            ${vacationForm.subType===opt ? 'bg-indigo-600 border-indigo-600 text-white shadow-md' : 'bg-white text-slate-400 border-slate-100'}`}>
                                        {opt}
                                    </button>
                                ))}
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <p className="text-[10px] font-black text-slate-400 mb-1 ml-1">시작일</p>
                                    <input type="date" value={vacationForm.startDate}
                                        onChange={e => setVacationForm({...vacationForm, startDate: e.target.value, endDate: vacationForm.type==='1.0'?vacationForm.endDate:e.target.value})}
                                        className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border border-slate-100" />
                                </div>
                                {vacationForm.type==='1.0' && (
                                    <div>
                                        <p className="text-[10px] font-black text-slate-400 mb-1 ml-1">종료일</p>
                                        <input type="date" value={vacationForm.endDate}
                                            onChange={e => setVacationForm({...vacationForm, endDate: e.target.value})}
                                            className="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border border-slate-100" />
                                    </div>
                                )}
                            </div>

                            <div className="flex gap-2 pt-1">
                                <button onClick={() => { setShowVacationModal(false); setEditingVacation(null); }}
                                    className="flex-1 p-4 font-bold text-slate-400">취소</button>
                                <button onClick={handleSaveVacation}
                                    className="flex-2 flex-1 p-4 bg-indigo-600 text-white rounded-2xl font-bold hover:bg-indigo-700 transition-colors">
                                    {editingVacation ? '수정 완료' : '저장'}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
