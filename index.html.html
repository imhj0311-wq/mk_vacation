
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Vacation Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap" rel="stylesheet">

    <!-- Firebase Libraries -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.FirebaseLib = {
            initializeApp, getAuth, signInAnonymously, signInWithCustomToken,
            onAuthStateChanged, getFirestore, collection, doc, addDoc, deleteDoc, onSnapshot
        };
    </script>

    <style>
        body { font-family: 'Pretendard', sans-serif; }
        .scale-in { animation: scaleIn 0.2s ease-out; }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to   { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="bg-[#f8fafc]">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ─────────────────────────────────────────
   공유 저장소 유틸 (window.storage 우선,
   없으면 localStorage 폴백)
───────────────────────────────────────── */
const STORAGE_KEY = 'team-vacation-shared-v1';

async function loadShared() {
    if (window.storage) {
        try {
            const res = await window.storage.get(STORAGE_KEY, true);
            if (res && res.value) return JSON.parse(res.value);
        } catch(e) { console.warn('shared load failed', e); }
    }
    // 폴백: localStorage
    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return JSON.parse(raw);
    } catch(e) {}
    return { members: [], vacations: [] };
}

async function saveShared(data) {
    const json = JSON.stringify(data);
    if (window.storage) {
        try {
            await window.storage.set(STORAGE_KEY, json, true);
            return;
        } catch(e) { console.warn('shared save failed', e); }
    }
    // 폴백: localStorage
    localStorage.setItem(STORAGE_KEY, json);
}

/* ─────────────────────────────────────────
   상수
───────────────────────────────────────── */
const SUB_OPTIONS = {
    '1.0' : ['연차'],
    '0.5' : ['오전반차', '오후반차'],
    '0.25': ['반반차(09-11)', '반반차(11-13)', '반반차(14-16)', '반반차(16-18)'],
    'MANO': ['마노(2h 늦참)', '마노(2h 조퇴)'],
};

const MEMBER_COLORS = [
    '#6366f1','#ec4899','#10b981','#f59e0b',
    '#3b82f6','#8b5cf6','#ef4444','#14b8a6',
];
const getMemberColor = (idx) => MEMBER_COLORS[idx % MEMBER_COLORS.length];

/* ─────────────────────────────────────────
   App
───────────────────────────────────────── */
const App = () => {
    // ── Firebase (클라우드) 상태
    const [isCloud, setIsCloud]   = useState(false);
    const [fbUser, setFbUser]     = useState(null);

    // ── 공통 데이터 상태
    const [members,   setMembers]   = useState([]);
    const [vacations, setVacations] = useState([]);
    const [loading,   setLoading]   = useState(true);
    const [saving,    setSaving]    = useState(false);
    const [toast,     setToast]     = useState(null);

    // ── UI 상태
    const [currentDate,        setCurrentDate]        = useState(new Date());
    const [showMemberModal,    setShowMemberModal]    = useState(false);
    const [showVacationModal,  setShowVacationModal]  = useState(false);
    const [newMember,          setNewMember]          = useState({ name: '', total: 15 });
    const [vacationForm,       setVacationForm]       = useState({
        memberId: '', type: '1.0', subType: '연차', startDate: '', endDate: ''
    });

    const appId = typeof __app_id !== 'undefined' ? __app_id : 'vacation-app-shared';
    const syncTimer = useRef(null);

    /* ── 토스트 헬퍼 */
    const showToast = (msg, type = 'success') => {
        setToast({ msg, type });
        setTimeout(() => setToast(null), 2500);
    };

    /* ────────────────────────────────────────
       1) 초기화: Firebase 먼저 시도, 안 되면
          window.storage / localStorage 사용
    ──────────────────────────────────────── */
    useEffect(() => {
        const init = async () => {
            // ── Firebase 시도
            if (typeof __firebase_config !== 'undefined' && window.FirebaseLib) {
                const { initializeApp, getAuth, signInAnonymously,
                        signInWithCustomToken, onAuthStateChanged } = window.FirebaseLib;
                try {
                    const app  = initializeApp(JSON.parse(__firebase_config));
                    const auth = getAuth(app);
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                    onAuthStateChanged(auth, (u) => {
                        setFbUser(u);
                        setIsCloud(!!u);
                    });
                    return; // Firebase 성공 → 아래 공유 스토리지 로드 생략
                } catch(e) {
                    console.warn('Firebase 연결 실패, 공유 스토리지로 전환:', e);
                }
            }

            // ── Firebase 없음 → window.storage / localStorage 사용
            const data = await loadShared();
            setMembers(data.members   || []);
            setVacations(data.vacations || []);
            setLoading(false);

            // 10초마다 폴링으로 다른 팀원 변경사항 동기화
            syncTimer.current = setInterval(async () => {
                const fresh = await loadShared();
                setMembers(fresh.members     || []);
                setVacations(fresh.vacations || []);
            }, 10000);
        };

        init();
        return () => { if (syncTimer.current) clearInterval(syncTimer.current); };
    }, []);

    /* ────────────────────────────────────────
       2) Firebase 실시간 구독 (클라우드 모드)
    ──────────────────────────────────────── */
    useEffect(() => {
        if (!isCloud || !fbUser) return;
        const { getFirestore, collection, onSnapshot } = window.FirebaseLib;
        const db = getFirestore();

        const unsubM = onSnapshot(
            collection(db, 'artifacts', appId, 'public', 'data', 'members'),
            (snap) => {
                setMembers(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                setLoading(false);
            }
        );
        const unsubV = onSnapshot(
            collection(db, 'artifacts', appId, 'public', 'data', 'vacations'),
            (snap) => setVacations(snap.docs.map(d => ({ id: d.id, ...d.data() })))
        );
        return () => { unsubM(); unsubV(); };
    }, [isCloud, fbUser, appId]);

    /* ────────────────────────────────────────
       저장 헬퍼: 클라우드 vs 공유 스토리지
    ──────────────────────────────────────── */
    const persistMembers   = async (list) => {
        if (!isCloud) {
            setSaving(true);
            await saveShared({ members: list, vacations });
            setSaving(false);
            showToast('팀 전체에 저장되었습니다 ✓');
        }
        // 클라우드 모드는 addDoc/deleteDoc 직접 처리
    };
    const persistVacations = async (list) => {
        if (!isCloud) {
            setSaving(true);
            await saveShared({ members, vacations: list });
            setSaving(false);
            showToast('팀 전체에 저장되었습니다 ✓');
        }
    };

    /* ── 멤버 추가 */
    const handleAddMember = async () => {
        if (!newMember.name.trim()) return;
        if (!isCloud) {
            const updated = [...members, { ...newMember, id: Date.now().toString() }];
            setMembers(updated);
            await saveShared({ members: updated, vacations });
            showToast('멤버가 등록되었습니다 ✓');
        } else {
            const { getFirestore, collection, addDoc } = window.FirebaseLib;
            await addDoc(
                collection(getFirestore(), 'artifacts', appId, 'public', 'data', 'members'),
                { name: newMember.name, total: newMember.total }
            );
        }
        setNewMember({ name: '', total: 15 });
        setShowMemberModal(false);
    };

    /* ── 멤버 삭제 */
    const handleDeleteMember = async (id) => {
        if (!confirm('멤버를 삭제할까요? 해당 멤버의 모든 일정도 삭제됩니다.')) return;
        if (!isCloud) {
            const newM = members.filter(m => m.id !== id);
            const newV = vacations.filter(v => v.memberId !== id);
            setMembers(newM);
            setVacations(newV);
            await saveShared({ members: newM, vacations: newV });
            showToast('멤버가 삭제되었습니다');
        } else {
            const { getFirestore, doc, deleteDoc } = window.FirebaseLib;
            const db = getFirestore();
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'members', id));
            // 해당 멤버 일정도 삭제
            for (const v of vacations.filter(v => v.memberId === id)) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'vacations', v.id));
            }
        }
    };

    /* ── 일정 추가 */
    const handleAddVacation = async () => {
        if (!vacationForm.memberId || !vacationForm.startDate) return;
        const entry = {
            ...vacationForm,
            endDate: vacationForm.type === '1.0'
                ? (vacationForm.endDate || vacationForm.startDate)
                : vacationForm.startDate,
        };
        if (!isCloud) {
            const updated = [...vacations, { ...entry, id: Date.now().toString() }];
            setVacations(updated);
            await saveShared({ members, vacations: updated });
            showToast('일정이 저장되었습니다 ✓');
        } else {
            const { getFirestore, collection, addDoc } = window.FirebaseLib;
            await addDoc(
                collection(getFirestore(), 'artifacts', appId, 'public', 'data', 'vacations'),
                { ...entry, createdAt: new Date().toISOString() }
            );
        }
        setShowVacationModal(false);
    };

    /* ── 일정 삭제 */
    const handleDeleteVacation = async (id) => {
        if (!confirm('일정을 삭제할까요?')) return;
        if (!isCloud) {
            const updated = vacations.filter(v => v.id !== id);
            setVacations(updated);
            await saveShared({ members, vacations: updated });
            showToast('일정이 삭제되었습니다');
        } else {
            const { getFirestore, doc, deleteDoc } = window.FirebaseLib;
            await deleteDoc(doc(getFirestore(), 'artifacts', appId, 'public', 'data', 'vacations', id));
        }
    };

    /* ── 연차 사용일 계산 */
    const calcUsed = (memberId) =>
        vacations
            .filter(v => v.memberId === memberId)
            .reduce((acc, v) => {
                if (v.type === 'MANO') return acc;
                if (v.type === '1.0') {
                    const diff = Math.ceil(
                        Math.abs(new Date(v.endDate) - new Date(v.startDate)) / 86400000
                    ) + 1;
                    return acc + diff;
                }
                return acc + parseFloat(v.type);
            }, 0);

    /* ── 달력 계산 */
    const year       = currentDate.getFullYear();
    const month      = currentDate.getMonth();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const firstDay   = new Date(year, month, 1).getDay();
    const days       = Array.from({ length: daysInMonth }, (_, i) => i + 1);
    const empties    = Array.from({ length: firstDay });
    const todayStr   = new Date().toISOString().split('T')[0];

    const memberColorMap = {};
    members.forEach((m, i) => { memberColorMap[m.id] = getMemberColor(i); });

    /* ── 로딩 화면 */
    if (loading && isCloud) return (
        <div className="h-screen flex items-center justify-center font-bold text-slate-400">
            팀 서버 연결 중...
        </div>
    );

    /* ──────────────── 렌더 ──────────────── */
    return (
        <div className="min-h-screen p-4 md:p-8 bg-[#f8fafc]">

            {/* 토스트 */}
            {toast && (
                <div style={{
                    position:'fixed', top:20, left:'50%', transform:'translateX(-50%)',
                    background: toast.type === 'error' ? '#ef4444' : '#10b981',
                    color:'#fff', padding:'10px 24px', borderRadius:50,
                    fontWeight:700, fontSize:13, zIndex:9999,
                    boxShadow:'0 4px 20px rgba(0,0,0,0.15)', whiteSpace:'nowrap'
                }}>
                    {toast.msg}
                </div>
            )}

            {/* 헤더 */}
            <header className="max-w-7xl mx-auto mb-10 text-center">
                <h1 className="text-4xl font-black text-slate-900 tracking-tight">🏖️ Team Vacation Pro</h1>
                <div className="flex items-center justify-center gap-2 mt-2">
                    {isCloud ? (
                        <div className="flex items-center gap-2 bg-green-50 px-3 py-1 rounded-full border border-green-100">
                            <span className="w-2 h-2 bg-green-500 rounded-full animate-ping"></span>
                            <p className="text-green-600 font-bold text-xs uppercase">실시간 클라우드 공유 중</p>
                        </div>
                    ) : (
                        <div className="flex items-center gap-2 bg-indigo-50 px-3 py-1 rounded-full border border-indigo-100">
                            <span className="w-2 h-2 bg-indigo-500 rounded-full animate-pulse"></span>
                            <p className="text-indigo-600 font-bold text-xs uppercase">
                                {saving ? '저장 중...' : '팀 공유 스토리지 모드'}
                            </p>
                        </div>
                    )}
                </div>
            </header>

            <div className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">

                {/* ── 왼쪽: 멤버 현황 */}
                <div className="lg:col-span-4 space-y-6">
                    <div className="bg-white rounded-[2.5rem] p-8 shadow-xl border border-slate-100">
                        <div className="flex justify-between items-center mb-6">
                            <h3 className="text-xl font-black text-indigo-600">멤버 현황</h3>
                            <button onClick={() => setShowMemberModal(true)}
                                className="bg-indigo-50 text-indigo-600 p-2 rounded-xl hover:bg-indigo-600 hover:text-white transition-all">
                                ➕
                            </button>
                        </div>

                        {/* 헤더 행 */}
                        <div className="grid grid-cols-4 items-center px-3 mb-2">
                            {['이름','총','사용','잔여'].map((h, i) => (
                                <div key={h} className={`text-[10px] font-black text-slate-300 uppercase ${i > 0 ? 'text-center' : ''}`}>{h}</div>
                            ))}
                        </div>

                        <div className="space-y-1">
                            {members.length === 0
                                ? <p className="text-center py-10 text-slate-300 text-sm">멤버를 추가하세요.</p>
                                : [...members]
                                    .sort((a, b) => a.name.localeCompare(b.name))
                                    .map(m => {
                                        const used = calcUsed(m.id);
                                        const rem  = (m.total - used).toFixed(1);
                                        const color = memberColorMap[m.id];
                                        return (
                                            <div key={m.id}
                                                className="grid grid-cols-4 items-center p-3 hover:bg-slate-50 rounded-2xl group transition-all">
                                                <div className="flex items-center gap-2">
                                                    <span style={{ width:8, height:8, borderRadius:'50%', background:color, display:'inline-block', flexShrink:0 }}></span>
                                                    <span className="font-bold text-slate-700">{m.name}</span>
                                                </div>
                                                <div className="text-center text-xs text-slate-400">{m.total}</div>
                                                <div className="text-center text-xs text-rose-500 font-bold">{used}</div>
                                                <div className="flex items-center justify-center gap-1">
                                                    <span className="text-indigo-600 font-black text-lg">{rem}</span>
                                                    <button onClick={() => handleDeleteMember(m.id)}
                                                        className="opacity-0 group-hover:opacity-100 ml-1 text-[10px] bg-red-100 text-red-400 rounded-md px-1 transition-all">
                                                        ✕
                                                    </button>
                                                </div>
                                            </div>
                                        );
                                    })
                            }
                        </div>
                    </div>

                    {/* 모드 안내 카드 */}
                    <div className={`${isCloud ? 'bg-green-600' : 'bg-indigo-600'} rounded-[2.5rem] p-8 text-white shadow-xl transition-colors`}>
                        <h4 className="font-bold mb-2">{isCloud ? '☁️ Firebase 실시간 동기화' : '🔗 팀 공유 스토리지 모드'}</h4>
                        <p className="text-[11px] opacity-80 leading-relaxed">
                            {isCloud
                                ? '모든 팀원이 동일한 데이터를 Firebase를 통해 실시간으로 확인하고 수정할 수 있습니다.'
                                : '저장 시 팀 공유 스토리지에 기록됩니다. 같은 페이지를 여는 모든 팀원이 동일한 데이터를 볼 수 있습니다. (10초마다 자동 갱신)'}
                        </p>
                    </div>
                </div>

                {/* ── 오른쪽: 달력 */}
                <div className="lg:col-span-8">
                    <div className="bg-white rounded-[2.5rem] p-8 shadow-xl border border-slate-100">
                        {/* 달력 헤더 */}
                        <div className="flex justify-between items-center mb-8">
                            <h2 className="text-2xl font-black">{year}년 {month + 1}월</h2>
                            <div className="flex gap-2 bg-slate-50 p-1.5 rounded-2xl">
                                <button onClick={() => setCurrentDate(new Date(year, month - 1, 1))}
                                    className="p-2 hover:bg-white rounded-xl">◀</button>
                                <button onClick={() => setCurrentDate(new Date())}
                                    className="px-4 py-1 font-bold text-xs bg-white shadow-sm rounded-xl">TODAY</button>
                                <button onClick={() => setCurrentDate(new Date(year, month + 1, 1))}
                                    className="p-2 hover:bg-white rounded-xl">▶</button>
                            </div>
                        </div>

                        {/* 요일 헤더 */}
                        <div className="grid grid-cols-7 gap-2">
                            {['SUN','MON','TUE','WED','THU','FRI','SAT'].map((d, i) => (
                                <div key={d} className={`text-center text-[10px] font-black mb-2
                                    ${i === 0 ? 'text-rose-400' : i === 6 ? 'text-indigo-400' : 'text-slate-300'}`}>
                                    {d}
                                </div>
                            ))}

                            {/* 빈 칸 */}
                            {empties.map((_, i) => <div key={`e${i}`}></div>)}

                            {/* 날짜 셀 */}
                            {days.map(d => {
                                const ds = `${year}-${String(month + 1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                                const todays = vacations.filter(v => ds >= v.startDate && ds <= (v.endDate || v.startDate));
                                const isToday = todayStr === ds;
                                const dow = new Date(ds).getDay();

                                return (
                                    <div key={d}
                                        onClick={() => {
                                            if (members.length === 0) return alert('멤버를 먼저 등록해주세요.');
                                            setVacationForm({
                                                memberId: members[0]?.id || '',
                                                type: '1.0', subType: '연차',
                                                startDate: ds, endDate: ds,
                                            });
                                            setShowVacationModal(true);
                                        }}
                                        className={`min-h-[110px] p-2 border rounded-2xl cursor-pointer hover:bg-indigo-50/30 transition-all
                                            ${isToday ? 'border-indigo-200 bg-indigo-50/30' : 'border-slate-50'}`}>

                                        <div className={`text-xs font-black
                                            ${isToday ? 'text-indigo-600' : dow === 0 ? 'text-rose-400' : dow === 6 ? 'text-indigo-400' : 'text-slate-400'}`}>
                                            {d}
                                        </div>

                                        <div className="mt-1 space-y-1">
                                            {todays.map(v => {
                                                const mem   = members.find(x => x.id === v.memberId);
                                                const color = memberColorMap[v.memberId] || '#6366f1';
                                                return (
                                                    <div key={v.id}
                                                        onClick={e => { e.stopPropagation(); handleDeleteVacation(v.id); }}
                                                        style={{ background: color + '22', color, borderLeft: `2.5px solid ${color}` }}
                                                        className="text-[9px] p-1 rounded-md font-black truncate shadow-sm cursor-pointer hover:opacity-70 transition-all">
                                                        {mem?.name || '...'} [{v.subType?.slice(0,2)}]
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            </div>

            {/* ── 모달: 멤버 등록 */}
            {showMemberModal && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-sm">
                    <div className="bg-white rounded-[2rem] p-8 w-full max-w-md scale-in shadow-2xl">
                        <h2 className="text-xl font-black mb-6">멤버 등록</h2>
                        <div className="space-y-4">
                            <input type="text" placeholder="이름"
                                value={newMember.name}
                                onChange={e => setNewMember({ ...newMember, name: e.target.value })}
                                onKeyDown={e => e.key === 'Enter' && handleAddMember()}
                                className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold border border-slate-100" />
                            <input type="number" placeholder="부여 연차"
                                value={newMember.total}
                                onChange={e => setNewMember({ ...newMember, total: parseFloat(e.target.value) || 0 })}
                                className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold border border-slate-100" />
                            <div className="flex gap-2">
                                <button onClick={() => setShowMemberModal(false)}
                                    className="flex-1 p-4 font-bold text-slate-400">취소</button>
                                <button onClick={handleAddMember}
                                    className="flex-1 p-4 bg-indigo-600 text-white rounded-2xl font-bold hover:bg-indigo-700 transition-colors">
                                    등록
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            )}

            {/* ── 모달: 일정 등록 */}
            {showVacationModal && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-sm">
                    <div className="bg-white rounded-[2rem] p-8 w-full max-w-lg scale-in shadow-2xl">
                        <h2 className="text-xl font-black mb-6">일정 등록</h2>
                        <div className="space-y-6">
                            <div className="grid grid-cols-2 gap-4">
                                <select value={vacationForm.memberId}
                                    onChange={e => setVacationForm({ ...vacationForm, memberId: e.target.value })}
                                    className="p-4 bg-slate-50 rounded-2xl font-bold outline-none border border-slate-100">
                                    {members.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                                </select>
                                <select value={vacationForm.type}
                                    onChange={e => setVacationForm({
                                        ...vacationForm,
                                        type: e.target.value,
                                        subType: SUB_OPTIONS[e.target.value][0]
                                    })}
                                    className="p-4 bg-slate-50 rounded-2xl font-bold outline-none border border-slate-100">
                                    <option value="1.0">연차 (1.0)</option>
                                    <option value="0.5">반차 (0.5)</option>
                                    <option value="0.25">반반차 (0.25)</option>
                                    <option value="MANO">마노데이 (0.0)</option>
                                </select>
                            </div>

                            <div className="grid grid-cols-2 gap-2">
                                {SUB_OPTIONS[vacationForm.type].map(opt => (
                                    <button key={opt}
                                        onClick={() => setVacationForm({ ...vacationForm, subType: opt })}
                                        className={`p-3 rounded-xl border-2 text-[10px] font-black transition-all
                                            ${vacationForm.subType === opt
                                                ? 'bg-indigo-600 border-indigo-600 text-white shadow-md'
                                                : 'bg-white text-slate-400 border-slate-100'}`}>
                                        {opt}
                                    </button>
                                ))}
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <input type="date" value={vacationForm.startDate}
                                    onChange={e => setVacationForm({
                                        ...vacationForm,
                                        startDate: e.target.value,
                                        endDate: vacationForm.type === '1.0' ? vacationForm.endDate : e.target.value
                                    })}
                                    className="p-4 bg-slate-50 rounded-2xl font-bold outline-none border border-slate-100" />
                                {vacationForm.type === '1.0' && (
                                    <input type="date" value={vacationForm.endDate}
                                        onChange={e => setVacationForm({ ...vacationForm, endDate: e.target.value })}
                                        className="p-4 bg-slate-50 rounded-2xl font-bold outline-none border border-slate-100" />
                                )}
                            </div>

                            <div className="flex gap-2">
                                <button onClick={() => setShowVacationModal(false)}
                                    className="flex-1 p-4 font-bold text-slate-400">취소</button>
                                <button onClick={handleAddVacation}
                                    className="flex-1 p-4 bg-indigo-600 text-white rounded-2xl font-bold hover:bg-indigo-700 transition-colors">
                                    저장
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
